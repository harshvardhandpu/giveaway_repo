services:
  nginx: { image: nginx:1.27-alpine, ports: ["80:80"], volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"], depends_on: [api] }
  api: { build: { context: .., dockerfile: apps/api/Dockerfile }, environment: { NODE_ENV: production, API_PORT: 3000, DATABASE_URL: postgresql://giveaway:giveaway@postgres:5432/giveaway_intelligence, REDIS_URL: redis://redis:6379, JWT_SECRET: ${JWT_SECRET} }, depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } } }
  ai-service: { build: ../apps/ai-service, environment: { QDRANT_URL: http://qdrant:6333 }, depends_on: [qdrant] }
  postgres: { image: postgres:16-alpine, environment: { POSTGRES_USER: giveaway, POSTGRES_PASSWORD: giveaway, POSTGRES_DB: giveaway_intelligence }, volumes: ["postgres_data:/var/lib/postgresql/data"], healthcheck: { test: ["CMD-SHELL","pg_isready -U giveaway"], interval: 5s, timeout: 3s, retries: 10 } }
  redis: { image: redis:7-alpine, volumes: ["redis_data:/data"], healthcheck: { test: ["CMD","redis-cli","ping"], interval: 5s, timeout: 3s, retries: 10 } }
  qdrant: { image: qdrant/qdrant:v1.13.2, volumes: ["qdrant_data:/qdrant/storage"] }
volumes: { postgres_data: {}, redis_data: {}, qdrant_data: {} }
