services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: giveaway
      POSTGRES_PASSWORD: giveaway
      POSTGRES_DB: giveaway_intelligence
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giveaway -d giveaway_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 3000
      DATABASE_URL: postgresql://giveaway:giveaway@postgres:5432/giveaway_intelligence?schema=public
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
  ai-service:
    build: ../apps/ai-service
    ports: ["8000:8000"]
volumes:
  postgres_data:
  qdrant_data:
